<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" type="text/css" href="https://unpkg.com/vue-audio-mixer/dist/vue-audio-mixer.min.css">
  <style>
    :root {
      color-scheme: light dark;
      --bg: #ffffff;
      --text: #000000;
    }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background: var(--bg);
    }

    #app {
      display: flex;
      justify-content: center;
    }

    .page {
      display: inline-block;
      padding: 20px 16px 28px;
    }

    select {
      padding: 5px;
      color: var(--text);
      font: inherit;
    }

    .mixer-shell {
      margin-top: 6px;
    }

    .vue-audio-mixer,
    .vue-audio-mixer-loading-hider,
    .vue-audio-mixer-channel-strip,
    .time_and_transport {
      overflow: visible !important;
    }

    .vue-audio-mixer-timer {
      white-space: nowrap !important;
    }

    .vue-audio-mixer-transport {
      margin-top: 26px !important;
    }

    .vue-audio-mixer-download-mix {
      display: none !important;
    }

    @media (max-width: 450px) {
      .page {
        padding: 14px 10px 20px;
      }
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #000000;
        --text: #ffffff;
      }
    }
  </style>
</head>

<body>
  <div id="app">
    <div class="page">
      <section class="toolbar">
        <select id="song-select" v-model="selectedSongId"
          :disabled="isLoadingManifest || isLoadingSong || songs.length === 0">
          <option v-for="song in songs" :key="song.id" :value="song.id">
            {{ song.label }}
          </option>
        </select>
      </section>

      <section class="mixer-shell">
        <div v-if="activeConfig">
          <vue-audio-mixer ref="audioMixer" :config="activeConfig" :size="mixerSize" :theme="mixerTheme"
            :show-pan="true" :show-total-time="true" />
        </div>
      </section>
    </div>
  </div>
  <script src="https://unpkg.com/vue@2.7.16/dist/vue.js"></script>
  <script src="https://unpkg.com/vue-audio-mixer/dist/vue-audio-mixer.min.js"></script>

  <script>
    const app = new Vue({
      el: '#app',
      data: function () {
        return {
          songs: [],
          selectedSongId: '',
          activeSong: null,
          activeConfig: null,
          isLoadingManifest: false,
          isLoadingSong: false,
          manifestUrl: './twisted.json',
          mixerSize: 'medium',
          mixerTheme: 'default',
          sizeQuery: window.matchMedia('(max-width: 450px)'),
          themeQuery: window.matchMedia('(prefers-color-scheme: dark)')
        }
      },
      watch: {
        selectedSongId: function () {
          this.loadSelectedSong();
        }
      },
      mounted: function () {
        this.updateMixerSize();
        this.updateMixerTheme();
        this.sizeQuery.addEventListener('change', this.updateMixerSize);
        this.themeQuery.addEventListener('change', this.updateMixerTheme);
        this.loadManifest();
      },
      beforeDestroy: function () {
        this.sizeQuery.removeEventListener('change', this.updateMixerSize);
        this.themeQuery.removeEventListener('change', this.updateMixerTheme);
      },
      methods: {
        updateMixerSize: function () {
          this.mixerSize = this.sizeQuery.matches ? 'small' : 'medium';
        },
        updateMixerTheme: function () {
          this.mixerTheme = this.themeQuery.matches ? 'dark' : 'default';
        },
        stopActiveMixer: function () {
          const mixer = this.$refs.audioMixer;
          mixer && mixer.pause();
        },
        loadManifest: async function () {
          this.isLoadingManifest = true;

          try {
            const response = await fetch(this.manifestUrl, { cache: 'no-store' });

            if (!response.ok) {
              throw new Error(`Unable to load song list (${response.status})`);
            }

            const payload = await response.json();
            const songs = Array.isArray(payload.songs) ? payload.songs : [];

            if (songs.length === 0) {
              throw new Error('Song list is empty or invalid.');
            }

            this.songs = songs;
            this.selectedSongId = this.selectedSongId || songs[0].id;
          } catch (error) {
            this.songs = [];
            this.activeSong = null;
            this.activeConfig = null;
          } finally {
            this.isLoadingManifest = false;
          }
        },
        loadSelectedSong: async function () {
          const song = this.songs.find((entry) => entry.id === this.selectedSongId);

          this.stopActiveMixer();
          this.activeSong = song || null;
          this.activeConfig = null;

          if (!song) {
            return;
          }

          this.isLoadingSong = true;

          try {
            const response = await fetch(song.configUrl, { cache: 'no-store' });

            if (!response.ok) {
              throw new Error(`Unable to load ${song.label} (${response.status})`);
            }

            const payload = await response.json();

            if (!payload || !Array.isArray(payload.tracks) || !payload.master) {
              throw new Error(`Invalid config in ${song.configUrl}`);
            }

            const resolvedConfig = this.resolveConfig(payload, song.configUrl);

            this.activeConfig = resolvedConfig;
          } catch (error) {
            this.activeConfig = null;
          } finally {
            this.isLoadingSong = false;
          }
        },
        resolveConfig: function (config, configUrl) {
          const configBase = new URL(configUrl, window.location.href);

          return {
            title: config.title || (this.activeSong && this.activeSong.label) || 'Untitled song',
            tracks: config.tracks.map((track) => ({
              ...track,
              url: new URL(track.url, configBase).href
            })),
            master: {
              pan: 0,
              gain: 1,
              muted: false,
              ...config.master
            }
          };
        }
      }
    })
  </script>
</body>

</html>
